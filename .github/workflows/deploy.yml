name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.techseba.com
          username: vocapix@village.techseba.com
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          server-dir: village.techseba.com/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/node_modules/**
            **/vendor/**
            **/.env
