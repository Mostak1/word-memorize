name: Deploy to cPanel via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload to cPanel via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # Use sftp:// prefix to force SFTP
          server: 139.99.120.183
          username: fluentoo
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21 # Standard SFTP port
          server-dir: public_html/vocapix.fluento.org/
          timeout: 30000
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/node_modules/**
            **/vendor/**
            **/.env
